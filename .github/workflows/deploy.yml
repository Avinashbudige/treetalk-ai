name: Release & Deployment

on:
  push:
    tags:
      - 'v*'
    branches: [ main ]
  workflow_dispatch:

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Get version from tag
      id: version
      run: |
        echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create release summary
      run: |
        cat > /tmp/release_summary.txt << 'EOF'
        # TreeTalk AI Release Information
        
        ## Version
        ${{ steps.version.outputs.tag_name }}
        
        ## What's Included
        - ✅ Gemini AI Health Analysis System
        - ✅ FastAPI REST Backend
        - ✅ Mock Sensor Data Generator (5 scenarios)
        - ✅ Automated Test Suite
        - ✅ Real Sensor Integration Examples
        - ✅ Complete Documentation
        
        ## Key Features
        - Real-time tree health monitoring
        - 14-sensor data analysis
        - AI-powered health reports
        - Severity classification
        - REST API endpoints
        
        ## Getting Started
        ```bash
        pip install -r requirements.txt
        cp .env.example .env
        python -m uvicorn api.main:app --reload
        ```
        
        ## Documentation
        - QUICKSTART.md - 5-minute setup guide
        - MVP_SUMMARY.md - Technical architecture
        - OVERVIEW.md - Visual overview
        - IMPLEMENTATION.md - Complete guide
        
        ## Support
        For issues and questions: https://github.com/Avinashbudige/treetalk-ai/issues
        
        **"Give trees a voice before it's too late."** 🌳
        EOF
        
        echo "✅ Release summary created"
        cat /tmp/release_summary.txt

  pre-deployment:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run full test suite
      run: |
        echo "🧪 Running comprehensive test suite..."
        
        # Test all imports
        python -c "
        from ai.gemini_health_prompt import get_system_prompt, get_analysis_prompt
        from api.main import app, SensorData, HealthReport
        from sensors.mock_sensor_readings import generate_sensor_data, SCENARIOS
        from example_integration import TreeHealthMonitor
        print('✅ All critical imports successful')
        "
    
    - name: Validate configuration
      run: |
        echo "⚙️  Validating configuration..."
        
        python -c "
        import json
        
        # Validate key config elements
        with open('requirements.txt', 'r') as f:
            deps = [l.strip() for l in f if l.strip() and not l.startswith('#')]
        
        print(f'✅ {len(deps)} dependencies configured')
        
        # Check for critical packages
        critical = ['fastapi', 'google-generativeai', 'pydantic', 'uvicorn']
        for pkg in critical:
            found = any(pkg in dep for dep in deps)
            if found:
                print(f'  ✓ {pkg} included')
            else:
                print(f'  ✗ {pkg} missing!')
                exit(1)
        "
    
    - name: Verify API structure
      run: |
        echo "🌐 Verifying API structure..."
        
        python -c "
        from api.main import app
        
        routes = sorted(set(route.path for route in app.routes))
        
        print('API Endpoints:')
        for route in routes:
            if route.startswith('/'):
                print(f'  ✓ {route}')
        
        if '/' in routes and '/analyze' in routes:
            print('\\n✅ Core API endpoints configured')
        else:
            print('\\n❌ Missing core endpoints')
            exit(1)
        "
    
    - name: Generate deployment manifest
      run: |
        echo "📦 Generating deployment manifest..."
        
        cat > deployment-manifest.txt << 'EOF'
        TreeTalk AI - Deployment Manifest
        ===================================
        
        Service: TreeTalk AI Health Monitor
        Version: ${{ github.ref }}
        Status: Ready for Deployment
        
        Components:
        - FastAPI Backend (api/main.py)
        - AI Prompt System (ai/gemini_health_prompt.py)
        - Sensor Integration (sensors/mock_sensor_readings.py)
        
        Requirements:
        - Python 3.9+
        - GEMINI_API_KEY environment variable
        - Dependencies in requirements.txt
        
        Startup Command:
        python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
        
        Health Check:
        GET http://localhost:8000/
        
        API Documentation:
        GET http://localhost:8000/docs
        
        Testing:
        python test_mvp.py
        EOF
        
        echo "✅ Deployment manifest created"
    
    - name: Summary
      if: success()
      run: |
        echo ""
        echo "╔════════════════════════════════════════╗"
        echo "║  ✅ PRE-DEPLOYMENT: ALL CHECKS PASSED   ║"
        echo "╚════════════════════════════════════════╝"
        echo ""
        echo "System is ready for deployment! 🚀"
        echo ""
