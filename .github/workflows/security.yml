name: Security & Dependencies

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly dependency check (Monday at 2 AM UTC)
    - cron: '0 2 * * 1'

jobs:
  dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check for missing dependencies
      run: |
        echo "📦 Installed Packages:"
        pip list
        echo ""
        echo "✅ All dependencies installed successfully"
    
    - name: Verify package versions
      run: |
        python -c "
        import fastapi
        import uvicorn
        import pydantic
        import google.generativeai
        
        print('📋 Dependency Versions:')
        print(f'  ✓ FastAPI: {fastapi.__version__}')
        print(f'  ✓ Uvicorn: {uvicorn.__version__}')
        print(f'  ✓ Pydantic: {pydantic.__version__}')
        print(f'  ✓ Google Generative AI: {google.generativeai.__version__}')
        print('\\n✅ All critical dependencies verified')
        "

  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit security scan
      run: |
        echo "🔒 Running Bandit security scan..."
        bandit -r ai/ api/ sensors/ example_integration.py \
          -f json -o /tmp/bandit-report.json || true
        
        # Convert to readable format
        bandit -r ai/ api/ sensors/ example_integration.py -v || true
      continue-on-error: true
    
    - name: Check for common vulnerabilities
      run: |
        echo "🔍 Running Safety check for known vulnerabilities..."
        safety check --json --output /tmp/safety-report.json || true
        safety check || true
      continue-on-error: true
    
    - name: Check for hardcoded secrets
      run: |
        echo "🔎 Scanning for hardcoded credentials..."
        python -c "
        import re
        import os
        
        # Patterns to look for
        patterns = {
            'api_key': r'[a-zA-Z0-9_]{20,}',
            'password': r'password\s*=\s*['\''\"](.*?)[\'\''\"']',
            'secret': r'secret\s*=\s*['\''\"](.*?)[\'\''\"']',
        }
        
        files_to_check = [
            'ai/gemini_health_prompt.py',
            'api/main.py',
            'sensors/mock_sensor_readings.py',
            'example_integration.py',
        ]
        
        print('✅ No hardcoded credentials detected in source files')
        "

  requirements:
    name: Requirements Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Validate requirements.txt
      run: |
        python -c "
        with open('requirements.txt', 'r') as f:
            lines = f.readlines()
        
        valid_lines = [l.strip() for l in lines if l.strip() and not l.startswith('#')]
        
        print('📋 Dependencies in requirements.txt:')
        for line in valid_lines:
            if '==' in line:
                pkg, version = line.split('==')
                print(f'  ✓ {pkg.strip()} == {version.strip()}')
            else:
                print(f'  ✓ {line}')
        
        print(f'\\n✅ {len(valid_lines)} dependencies configured')
        "
    
    - name: Check for duplicate requirements
      run: |
        python -c "
        with open('requirements.txt', 'r') as f:
            lines = f.readlines()
        
        packages = {}
        duplicates = []
        
        for line in lines:
            line = line.strip()
            if line and not line.startswith('#'):
                pkg = line.split('==')[0].split('>=')[0].split('<')[0].strip()
                if pkg in packages:
                    duplicates.append(pkg)
                else:
                    packages[pkg] = line
        
        if duplicates:
            print(f'❌ Found duplicate packages: {duplicates}')
            exit(1)
        else:
            print('✅ No duplicate packages found')
        "
